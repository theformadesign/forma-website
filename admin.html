<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forma Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-view" class="login-wrap">
  <div class="login-card">
    <div class="brand">forma<span>.admin</span></div>
    <p class="muted">Sign in to manage projects.</p>
    <input id="email" type="email" placeholder="Email" autocomplete="username" />
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="login-btn" class="btn btn-primary">Sign in</button>
    <div id="login-error" class="error"></div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="app-view" class="hidden">
  <header class="topbar">
    <div class="brand">forma<span>.admin</span></div>
    <div class="topbar-right">
      <span id="user-email" class="muted"></span>
      <button id="logout-btn" class="btn btn-ghost">Log out</button>
    </div>
  </header>

  <main class="layout">
    <!-- Editor -->
    <section class="panel">
      <h2 id="form-title">Add project</h2>
      <input type="hidden" id="edit-id" />

      <label>Title</label>
      <input id="f-title" type="text" placeholder="e.g. Raspberry Potion" />

      <label>Category</label>
      <input id="f-category" type="text" placeholder="e.g. Packaging" />

      <label class="checkbox">
        <input id="f-featured" type="checkbox" />
        Show on homepage highlights
      </label>

      <label>Display order <span class="muted">(lower = first)</span></label>
      <input id="f-sort" type="number" value="0" />

      <label>Hero image</label>
      <div id="hero-preview" class="hero-preview empty">No hero image</div>
      <input id="f-hero-file" type="file" accept="image/*" />

      <h3 class="section-divider">Case study details</h3>

      <label>Client</label>
      <input id="f-client" type="text" placeholder="e.g. Potion Wellness Co." />

      <label>Timeline</label>
      <input id="f-timeline" type="text" placeholder="e.g. Aug – Oct 2024" />

      <label>The Challenge</label>
      <textarea id="f-challenge" rows="3" placeholder="What problem were we solving?"></textarea>

      <label>Strategy</label>
      <textarea id="f-strategy" rows="3" placeholder="How did we approach it?"></textarea>

      <label>Gallery images <span class="muted">(4 recommended — shown in a grid)</span></label>
      <div id="gallery-preview" class="gallery-preview"></div>
      <input id="f-gallery-files" type="file" accept="image/*" multiple />

      <label>The Solution</label>
      <textarea id="f-solution" rows="3" placeholder="What did we deliver?"></textarea>

      <label>Impact</label>
      <textarea id="f-impact" rows="3" placeholder="Results, numbers, outcomes"></textarea>

      <label>Reflection</label>
      <textarea id="f-reflection" rows="3" placeholder="What we learned"></textarea>

      <div class="row">
        <button id="save-btn" class="btn btn-primary">Add project</button>
        <button id="cancel-btn" class="btn btn-ghost hidden">Cancel</button>
      </div>
      <div id="form-status" class="status"></div>
    </section>

    <!-- List -->
    <section class="panel">
      <div class="panel-head">
        <h2>Projects <span id="count" class="pill">0</span></h2>
      </div>
      <div id="project-list" class="project-list"></div>
    </section>
  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
